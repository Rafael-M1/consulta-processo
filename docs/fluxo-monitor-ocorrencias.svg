<svg width="680" height="666" viewBox="0 0 680 666" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Fluxo do script de monitoramento de ocorrências judiciais</title>
<desc>Fluxograma mostrando as etapas do main.py: carregar números, buscar processos, buscar ocorrências, comparar hash, disparar alerta se mudou, e imprimir tabela resumo.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect x="0" y="0" width="680" height="666" fill="#ffffff"/>

<rect x="190" y="40" width="300" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="58" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">numeros.json</text>
<text x="340" y="76" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#444441">Lista de números únicos a monitorar</text>
<line x1="340" y1="96" x2="340" y2="146" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="190" y="146" width="300" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="340" y="164" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#042C53">buscar_ids_processo()</text>
<text x="340" y="182" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0C447C">GET /processos-expedientes/filtro</text>
<line x1="340" y1="202" x2="340" y2="252" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="190" y="252" width="300" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="270" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C">buscar_ocorrencias()</text>
<text x="340" y="288" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#085041">GET /ocorrencias/id, por processo</text>
<line x1="340" y1="308" x2="340" y2="358" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="190" y="358" width="300" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="376" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">Comparar hash</text>
<text x="340" y="394" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#3C3489">Novo hash vs. controle_ocorrencias.json</text>
<line x1="340" y1="414" x2="340" y2="464" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="190" y="464" width="300" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="340" y="482" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">Mudou?</text>
<text x="340" y="500" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#712B13">Se sim: dispara alerta e salva hash</text>
<line x1="340" y1="520" x2="340" y2="570" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="190" y="570" width="300" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="588" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Tabela resumo</text>
<text x="340" y="606" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#444441">Status de cada número/processo</text>

</svg>
